<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Freebuff 控制台</title>
  <style>
    :root {
      --bg: #fff5fb;
      --bg-soft: #ffe8f4;
      --card: #ffffff;
      --line: #ffd0e6;
      --line-strong: #ffb3d7;
      --primary: #e91e63;
      --primary-strong: #c2185b;
      --text-main: #3a1d2f;
      --text-sub: #7a4d66;
      --ok: #1b8f4b;
      --danger: #c62828;
      --shadow: 0 10px 30px rgba(233, 30, 99, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      color: var(--text-main);
      background:
        radial-gradient(circle at 0% 0%, #ffffff 0, var(--bg-soft) 42%, transparent 72%),
        radial-gradient(circle at 100% 100%, #ffffff 0, var(--bg-soft) 38%, transparent 70%),
        var(--bg);
      padding: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #fff 0%, #ffe7f3 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .hero h1 {
      font-size: clamp(20px, 2.2vw, 28px);
      color: var(--primary-strong);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero p {
      margin-top: 8px;
      color: var(--text-sub);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(233, 30, 99, 0.08);
      padding: 14px;
    }

    .wide { grid-column: 1 / -1; }

    .card h2 {
      color: var(--primary-strong);
      font-size: 16px;
      margin-bottom: 12px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .card-head h2 { margin: 0; }

    .row { margin-bottom: 10px; }
    .row:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text-sub);
      font-weight: 500;
    }

    input, textarea, button {
      width: 100%;
      border-radius: 8px;
      font-size: 14px;
    }

    input, textarea {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text-main);
      padding: 10px 12px;
      outline: none;
      transition: .2s ease;
    }

    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.14);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    button {
      border: none;
      cursor: pointer;
      padding: 10px 12px;
      color: #fff;
      background: linear-gradient(145deg, var(--primary), var(--primary-strong));
      font-weight: 600;
      transition: transform .1s ease, filter .2s ease;
      margin-top: 8px;
      box-shadow: 0 8px 18px rgba(233, 30, 99, 0.2);
    }

    button:hover:not(:disabled) { filter: brightness(1.03); }
    button:active:not(:disabled) { transform: translateY(1px); }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .ghost {
      background: #fff;
      color: var(--primary-strong);
      border: 1px solid var(--line-strong);
      box-shadow: none;
    }

    .btn-inline {
      width: auto;
      margin-top: 0;
      padding: 8px 12px;
      font-size: 13px;
    }

    .meta {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-sub);
      word-break: break-all;
    }

    a {
      color: var(--primary-strong);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    code {
      background: #fff6fb;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--primary-strong);
      padding: 2px 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    #status {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 40px;
      padding: 10px 12px;
      background: #fff9fc;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      font-size: 14px;
    }

    #status.ok {
      color: var(--ok);
      border-color: #ccead8;
      background: #f0fbf5;
    }

    #status.err {
      color: var(--danger);
      border-color: #f1cccc;
      background: #fff4f4;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .stat-card {
      background: linear-gradient(160deg, #fff, #fff4fa);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 21px;
      font-weight: 700;
      color: var(--primary-strong);
      line-height: 1.2;
    }

    .stat-label {
      margin-top: 3px;
      font-size: 12px;
      color: var(--text-sub);
    }

    .table-wrap {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
      font-size: 13px;
    }

    th, td {
      text-align: left;
      padding: 9px 10px;
      white-space: nowrap;
      border-bottom: 1px solid #ffe8f3;
    }

    th {
      background: #fff4fa;
      color: var(--primary-strong);
      font-weight: 600;
    }

    td { color: var(--text-sub); }

    .logo-icon {
      width: 20px;
      height: 20px;
      color: var(--primary-strong);
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .hero, .card { padding: 12px; }
      .card-actions { width: 100%; }
      .card-actions button { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        Freebuff 控制台
      </h1>
      <p>登录、授权、统计与导出一体化管理（玫红白配色版）。</p>
    </section>

    <section class="grid">
      <div class="card" id="adminRow" style="display:none;">
        <h2>管理认证</h2>
        <div class="row">
          <label for="adminPassword">管理密码</label>
          <input id="adminPassword" type="password" placeholder="请输入管理密码">
        </div>
        <button id="adminLoginBtn">登录管理页面</button>
        <button id="adminLogoutBtn" class="ghost" style="display:none;">退出登录</button>
      </div>

      <div class="card">
        <h2>登录会话</h2>
        <div class="row">
          <label for="fingerprintInput">自定义 fingerprint_id（可选）</label>
          <input id="fingerprintInput" placeholder="留空则自动生成">
        </div>
        <button id="createBtn">1) 生成登录链接</button>
        <div class="meta">login_url：<a id="loginLink" target="_blank" rel="noopener"></a></div>
        <div class="meta">fingerprint_id：<code id="fpId"></code></div>
        <div class="meta">fingerprint_hash：<code id="fpHash"></code></div>
        <div class="meta">expires_at：<code id="expiresAt"></code></div>
      </div>

      <div class="card">
        <h2>授权状态</h2>
        <button id="pollBtn" disabled>2) 轮询登录状态</button>
        <div class="row" style="margin-top:10px;">
          <div id="status"></div>
        </div>
      </div>

      <div class="card wide">
        <div class="card-head">
          <h2>统计面板</h2>
          <div class="card-actions" style="display:flex;gap:8px;flex-wrap:wrap;">
            <button id="statsRefreshBtn" class="ghost btn-inline">刷新统计</button>
            <button id="exportJsonBtn" class="ghost btn-inline">导出 JSON</button>
            <button id="copyTokensBtn" class="ghost btn-inline">复制 AUTH_TOKENS</button>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="statTotalRequests">0</div>
            <div class="stat-label">总调用</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statSuccess">0</div>
            <div class="stat-label">成功调用</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statFailed">0</div>
            <div class="stat-label">失败调用</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statTokenCount">0</div>
            <div class="stat-label">Token 数量</div>
          </div>
        </div>

        <div class="meta">最后请求时间：<code id="lastRequestAt">-</code></div>

        <div class="meta" style="margin-top:12px;">Token 调用统计</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Token</th>
                <th>请求</th>
                <th>成功</th>
                <th>失败</th>
                <th>活跃 Run</th>
                <th>最近使用</th>
              </tr>
            </thead>
            <tbody id="tokenStatsBody">
              <tr><td colspan="6">暂无数据</td></tr>
            </tbody>
          </table>
        </div>

        <div class="meta" style="margin-top:12px;">模型调用统计</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>模型</th>
                <th>请求</th>
                <th>成功</th>
                <th>失败</th>
              </tr>
            </thead>
            <tbody id="modelStatsBody">
              <tr><td colspan="4">暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card wide">
        <h2>AUTH_TOKENS（兼容旧部署）</h2>
        <textarea id="tokens" readonly></textarea>
      </div>
    </section>
  </main>

  <script>
    const state = {};
    const el = (id) => document.getElementById(id);
    const statusEl = el("status");

    function setStatus(text, cls = "") {
      statusEl.className = cls;
      statusEl.textContent = text;
    }

    function setAuthUI(status) {
      const enabled = !!status?.enabled;
      const authenticated = !!status?.authenticated;
      el("adminRow").style.display = enabled ? "block" : "none";
      el("adminLoginBtn").style.display = enabled && !authenticated ? "block" : "none";
      el("adminPassword").style.display = enabled && !authenticated ? "block" : "none";
      el("adminLogoutBtn").style.display = enabled && authenticated ? "block" : "none";
      const disabled = enabled && !authenticated;
      el("createBtn").disabled = disabled;
      el("pollBtn").disabled = disabled || !state.fingerprint_id;
      el("statsRefreshBtn").disabled = disabled;
      el("exportJsonBtn").disabled = disabled;
      el("copyTokensBtn").disabled = disabled;
      if (disabled) setStatus("请先输入管理密码登录。");
    }

    function formatTime(value) {
      if (!value) return "-";
      const time = new Date(value);
      if (Number.isNaN(time.getTime())) return "-";
      return time.toLocaleString();
    }

    function numberValue(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function renderTokenStats(items) {
      const body = el("tokenStatsBody");
      const rows = Array.isArray(items) ? items : [];
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="6">暂无数据</td></tr>`;
        return;
      }
      body.innerHTML = rows.map((token) => {
        const runCount = Array.isArray(token?.runs) ? token.runs.length : 0;
        return `<tr>
          <td>${token?.name || "-"}</td>
          <td>${numberValue(token?.total_requests)}</td>
          <td>${numberValue(token?.success_count)}</td>
          <td>${numberValue(token?.failure_count)}</td>
          <td>${runCount}</td>
          <td>${formatTime(token?.last_used_at)}</td>
        </tr>`;
      }).join("");
    }

    function renderModelStats(items) {
      const body = el("modelStatsBody");
      const rows = Array.isArray(items) ? items : [];
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="4">暂无数据</td></tr>`;
        return;
      }
      body.innerHTML = rows.map((model) => `<tr>
        <td>${model?.model || "-"}</td>
        <td>${numberValue(model?.requests)}</td>
        <td>${numberValue(model?.success)}</td>
        <td>${numberValue(model?.failed)}</td>
      </tr>`).join("");
    }

    function renderStats(data) {
      const calls = data?.calls || {};
      const tokens = data?.tokens || {};
      el("statTotalRequests").textContent = numberValue(calls.total_requests);
      el("statSuccess").textContent = numberValue(calls.success_count);
      el("statFailed").textContent = numberValue(calls.failure_count);
      el("statTokenCount").textContent = numberValue(tokens.total);
      el("lastRequestAt").textContent = formatTime(calls.last_request_at);
      renderTokenStats(tokens.items);
      renderModelStats(calls.by_model);
    }

    async function fetchStats() {
      const res = await fetch("/api/stats");
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "获取统计失败");
      renderStats(data);
      return data;
    }

    async function fetchExportData() {
      const res = await fetch("/api/export/json");
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "导出失败");
      return data;
    }

    async function exportJSONFile() {
      const data = await fetchExportData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `Freebuff-export-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function copyAuthTokens() {
      const data = await fetchExportData();
      const tokens = Array.isArray(data?.auth_tokens) ? data.auth_tokens : [];
      await navigator.clipboard.writeText(JSON.stringify(tokens));
    }

    async function fetchAdminStatus() {
      const res = await fetch("/api/admin/status");
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "获取管理状态失败");
      setAuthUI(data);
      return data;
    }

    async function loginAdmin() {
      const password = el("adminPassword").value.trim();
      if (!password) throw new Error("请输入管理密码");
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "登录失败");
      await fetchAdminStatus();
      await fetchStats();
      setStatus("管理登录成功。", "ok");
    }

    async function logoutAdmin() {
      const res = await fetch("/api/admin/logout", { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "退出失败");
      await fetchAdminStatus();
      renderStats({});
      setStatus("已退出管理登录。");
    }

    async function createSession() {
      setStatus("正在创建登录链接...");
      const fingerprint = el("fingerprintInput").value.trim();
      const body = fingerprint ? { fingerprint_id: fingerprint } : {};
      const res = await fetch("/api/login/session", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "创建失败");

      state.fingerprint_id = data.fingerprint_id;
      state.fingerprint_hash = data.fingerprint_hash;
      state.expires_at = data.expires_at;

      el("loginLink").href = data.login_url;
      el("loginLink").textContent = data.login_url;
      el("fpId").textContent = data.fingerprint_id;
      el("fpHash").textContent = data.fingerprint_hash;
      el("expiresAt").textContent = data.expires_at;
      el("pollBtn").disabled = false;
      setStatus("登录链接已生成，请在新窗口完成授权。", "ok");
    }

    async function pollStatus() {
      if (!state.fingerprint_id) return;
      setStatus("轮询中...");
      const qs = new URLSearchParams({
        fingerprint_id: state.fingerprint_id,
        fingerprint_hash: state.fingerprint_hash,
        expires_at: state.expires_at
      });
      const res = await fetch(`/api/login/status?${qs}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "查询失败");

      if (!data.user) {
        setStatus("尚未授权，稍后重试。");
        return;
      }

      const token = data.user.authToken || "";
      el("tokens").value = JSON.stringify([token]);
      const tag = data.token_registered ? "并已注册到服务" : "（已存在，无需重复注册）";
      setStatus(`登录成功：${data.user.name || ""} ${data.user.email || ""} ${tag}`.trim(), "ok");
    }

    el("createBtn").addEventListener("click", async () => {
      try { await createSession(); } catch (e) { setStatus(e.message, "err"); }
    });

    el("pollBtn").addEventListener("click", async () => {
      try { await pollStatus(); } catch (e) { setStatus(e.message, "err"); }
    });

    el("adminLoginBtn").addEventListener("click", async () => {
      try { await loginAdmin(); } catch (e) { setStatus(e.message, "err"); }
    });

    el("adminLogoutBtn").addEventListener("click", async () => {
      try { await logoutAdmin(); } catch (e) { setStatus(e.message, "err"); }
    });

    el("statsRefreshBtn").addEventListener("click", async () => {
      try { await fetchStats(); setStatus("统计已更新。", "ok"); } catch (e) { setStatus(e.message, "err"); }
    });

    el("exportJsonBtn").addEventListener("click", async () => {
      try { await exportJSONFile(); setStatus("JSON 导出成功。", "ok"); } catch (e) { setStatus(e.message, "err"); }
    });

    el("copyTokensBtn").addEventListener("click", async () => {
      try { await copyAuthTokens(); setStatus("AUTH_TOKENS 已复制。", "ok"); } catch (e) { setStatus(e.message, "err"); }
    });

    async function initializeDashboard() {
      let authStatus;
      try {
        authStatus = await fetchAdminStatus();
      } catch (e) {
        setStatus(e.message, "err");
        return;
      }
      if (!authStatus?.enabled || authStatus?.authenticated) {
        try {
          await fetchStats();
        } catch (e) {
          setStatus(`统计加载失败：${e.message}`, "err");
        }
      } else {
        renderStats({});
      }
    }

    initializeDashboard();
  </script>
</body>
</html>
