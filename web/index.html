<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Freebuff 控制台</title>
  <style>
    :root {
      --rose-50: #fff1f8;
      --rose-100: #ffe4f1;
      --rose-200: #ffcce5;
      --rose-300: #ffb2d7;
      --rose-500: #e91e63;
      --rose-500-rgb: 233, 30, 99;
      --rose-600: #d81b60;
      --rose-700: #bf1654;
      --text-900: #2f1b26;
      --text-700: #6a4f5d;
      --text-500: #8b6a79;
      --white: #ffffff;
      --danger: #c62828;
      --success: #1b8f4b;
      --shadow: 0 12px 28px rgba(var(--rose-500-rgb), 0.16);
      --radius-lg: 18px;
      --radius-md: 12px;
      --textarea-min-height: 96px;
      --status-min-height: 42px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-900);
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 0%, #fff 0, var(--rose-100) 36%, transparent 70%),
        radial-gradient(circle at 90% 100%, #fff 0, var(--rose-100) 34%, transparent 70%),
        var(--rose-50);
      padding: 24px 16px;
    }

    .shell {
      max-width: 920px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(145deg, var(--white), var(--rose-100));
      border: 1px solid var(--rose-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 34px);
      letter-spacing: 0.2px;
      color: var(--rose-700);
    }

    .hero p {
      margin: 10px 0 0;
      color: var(--text-700);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--rose-200);
      border-radius: var(--radius-md);
      box-shadow: 0 6px 22px rgba(var(--rose-500-rgb), 0.08);
      padding: 16px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: var(--rose-700);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card-head h2 {
      margin: 0;
    }

    .row { margin-bottom: 12px; }
    .row:last-child { margin-bottom: 0; }
    .row-top-gap { margin-top: 10px; }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text-700);
    }

    input, button, textarea {
      width: 100%;
      font-size: 14px;
      border-radius: 10px;
    }

    input, textarea {
      padding: 10px 12px;
      border: 1px solid var(--rose-200);
      color: var(--text-900);
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus, textarea:focus {
      border-color: var(--rose-500);
      box-shadow: 0 0 0 3px rgba(var(--rose-500-rgb), 0.12);
    }

    textarea {
      min-height: var(--textarea-min-height);
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    button {
      border: none;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(145deg, var(--rose-500), var(--rose-600));
      box-shadow: 0 8px 20px rgba(var(--rose-500-rgb), 0.24);
      transition: transform .12s ease, filter .2s ease;
      margin-top: 8px;
    }

    button:hover:not(:disabled) { filter: brightness(1.03); }
    button:active:not(:disabled) { transform: translateY(1px); }

    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.6);
      opacity: .58;
      box-shadow: none;
    }

    .ghost {
      background: #fff;
      color: var(--rose-700);
      border: 1px solid var(--rose-300);
      box-shadow: none;
    }

    .btn-inline {
      width: auto;
      margin-top: 0;
      padding: 8px 12px;
      font-size: 13px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .stat-box {
      background: linear-gradient(160deg, #fff, var(--rose-50));
      border: 1px solid var(--rose-200);
      border-radius: 10px;
      padding: 10px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-500);
    }

    .stat-value {
      margin-top: 4px;
      font-size: 22px;
      line-height: 1.2;
      color: var(--rose-700);
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--rose-200);
      border-radius: 10px;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 520px;
    }

    th, td {
      text-align: left;
      padding: 9px 10px;
      border-bottom: 1px solid var(--rose-100);
      white-space: nowrap;
    }

    th {
      color: var(--rose-700);
      background: var(--rose-50);
      font-weight: 600;
    }

    td {
      color: var(--text-700);
    }

    .meta {
      font-size: 12px;
      color: var(--text-500);
      margin-top: 8px;
      word-break: break-all;
    }

    code {
      background: var(--rose-50);
      color: var(--rose-700);
      border: 1px solid var(--rose-200);
      border-radius: 8px;
      padding: 2px 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    a {
      color: var(--rose-700);
      text-decoration: none;
      word-break: break-all;
    }

    a:hover { text-decoration: underline; }

    #status {
      border-radius: 10px;
      border: 1px solid var(--rose-200);
      background: var(--rose-50);
      color: var(--text-700);
      padding: 10px 12px;
      min-height: var(--status-min-height);
      display: flex;
      align-items: center;
      font-size: 14px;
    }

    #status.ok {
      color: var(--success);
      border-color: #cdebd9;
      background: #f0fbf5;
    }

    #status.err {
      color: var(--danger);
      border-color: #f3d0d0;
      background: #fff4f4;
    }

    @media (max-width: 640px) {
      .hero { padding: 22px 18px; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Freebuff 控制台</h1>
      <p>通过网页完成 Freebuff 登录，并自动注册 Token 到服务运行时。</p>
    </section>

    <section class="grid">
      <div class="card" id="adminRow" style="display:none;">
        <h2>管理认证</h2>
        <div class="row">
          <label for="adminPassword">管理密码</label>
          <input id="adminPassword" type="password" placeholder="请输入管理密码">
        </div>
        <button id="adminLoginBtn">登录管理页面</button>
        <button id="adminLogoutBtn" class="ghost" style="display:none;">退出登录</button>
      </div>

      <div class="card">
        <h2>登录会话</h2>
        <div class="row">
          <label for="fingerprintInput">自定义 fingerprint_id（可选）</label>
          <input id="fingerprintInput" placeholder="留空则自动生成">
        </div>
        <button id="createBtn">1) 生成登录链接</button>

        <div class="meta">login_url：<a id="loginLink" target="_blank" rel="noopener"></a></div>
        <div class="meta">fingerprint_id: <code id="fpId"></code></div>
        <div class="meta">fingerprint_hash: <code id="fpHash"></code></div>
        <div class="meta">expires_at: <code id="expiresAt"></code></div>
      </div>

      <div class="card">
        <h2>授权状态</h2>
        <button id="pollBtn" disabled>2) 轮询登录状态</button>
        <div class="row row-top-gap">
          <div id="status"></div>
        </div>
      </div>

      <div class="card" style="grid-column: 1 / -1;">
        <div class="card-head">
          <h2>统计面板</h2>
          <button id="statsRefreshBtn" class="ghost btn-inline">刷新统计</button>
        </div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">总调用</div>
            <div class="stat-value" id="statTotalRequests">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">成功调用</div>
            <div class="stat-value" id="statSuccess">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">失败调用</div>
            <div class="stat-value" id="statFailed">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Token 数量</div>
            <div class="stat-value" id="statTokenCount">0</div>
          </div>
        </div>
        <div class="meta">最后请求时间：<code id="lastRequestAt">-</code></div>

        <div class="meta" style="margin-top:12px;">Token 调用统计</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Token</th>
                <th>请求</th>
                <th>成功</th>
                <th>失败</th>
                <th>活跃 Run</th>
                <th>最近使用</th>
              </tr>
            </thead>
            <tbody id="tokenStatsBody">
              <tr><td colspan="6">暂无数据</td></tr>
            </tbody>
          </table>
        </div>

        <div class="meta" style="margin-top:12px;">模型调用统计</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>模型</th>
                <th>请求</th>
                <th>成功</th>
                <th>失败</th>
              </tr>
            </thead>
            <tbody id="modelStatsBody">
              <tr><td colspan="4">暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card" style="grid-column: 1 / -1;">
        <h2>AUTH_TOKENS（兼容旧部署）</h2>
        <textarea id="tokens" readonly></textarea>
      </div>
    </section>
  </main>

  <script>
    const state = {};
    const el = (id) => document.getElementById(id);
    const statusEl = el("status");

    function setStatus(text, cls = "") {
      statusEl.className = cls;
      statusEl.textContent = text;
    }

    function setAuthUI(status) {
      const enabled = !!status?.enabled;
      const authenticated = !!status?.authenticated;
      el("adminRow").style.display = enabled ? "block" : "none";
      el("adminLoginBtn").style.display = enabled && !authenticated ? "block" : "none";
      el("adminPassword").style.display = enabled && !authenticated ? "block" : "none";
      el("adminLogoutBtn").style.display = enabled && authenticated ? "block" : "none";
      const disabled = enabled && !authenticated;
      el("createBtn").disabled = disabled;
      el("pollBtn").disabled = disabled || !state.fingerprint_id;
      el("statsRefreshBtn").disabled = disabled;
      if (disabled) setStatus("请先输入管理密码登录。");
    }

    function formatTime(value) {
      if (!value) return "-";
      const time = new Date(value);
      if (Number.isNaN(time.getTime())) return "-";
      return time.toLocaleString();
    }

    function numberValue(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function renderTokenStats(items) {
      const body = el("tokenStatsBody");
      const rows = Array.isArray(items) ? items : [];
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="6">暂无数据</td></tr>`;
        return;
      }
      body.innerHTML = rows.map((token) => {
        const runCount = Array.isArray(token?.runs) ? token.runs.length : 0;
        return `<tr>
          <td>${token?.name || "-"}</td>
          <td>${numberValue(token?.total_requests)}</td>
          <td>${numberValue(token?.success_count)}</td>
          <td>${numberValue(token?.failure_count)}</td>
          <td>${runCount}</td>
          <td>${formatTime(token?.last_used_at)}</td>
        </tr>`;
      }).join("");
    }

    function renderModelStats(items) {
      const body = el("modelStatsBody");
      const rows = Array.isArray(items) ? items : [];
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="4">暂无数据</td></tr>`;
        return;
      }
      body.innerHTML = rows.map((model) => `<tr>
        <td>${model?.model || "-"}</td>
        <td>${numberValue(model?.requests)}</td>
        <td>${numberValue(model?.success)}</td>
        <td>${numberValue(model?.failed)}</td>
      </tr>`).join("");
    }

    function renderStats(data) {
      const calls = data?.calls || {};
      const tokens = data?.tokens || {};
      el("statTotalRequests").textContent = numberValue(calls.total_requests);
      el("statSuccess").textContent = numberValue(calls.success_count);
      el("statFailed").textContent = numberValue(calls.failure_count);
      el("statTokenCount").textContent = numberValue(tokens.total);
      el("lastRequestAt").textContent = formatTime(calls.last_request_at);
      renderTokenStats(tokens.items);
      renderModelStats(calls.by_model);
    }

    async function fetchStats() {
      const res = await fetch("/api/stats");
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "获取统计失败");
      renderStats(data);
      return data;
    }

    async function fetchAdminStatus() {
      const res = await fetch("/api/admin/status");
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "获取管理状态失败");
      setAuthUI(data);
      return data;
    }

    async function loginAdmin() {
      const password = el("adminPassword").value.trim();
      if (!password) throw new Error("请输入管理密码");
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "登录失败");
      await fetchAdminStatus();
      await fetchStats();
      setStatus("管理登录成功。", "ok");
    }

    async function logoutAdmin() {
      const res = await fetch("/api/admin/logout", { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "退出失败");
      await fetchAdminStatus();
      renderStats({});
      setStatus("已退出管理登录。");
    }

    async function createSession() {
      setStatus("正在创建登录链接...");
      const fingerprint = el("fingerprintInput").value.trim();
      const body = fingerprint ? { fingerprint_id: fingerprint } : {};
      const res = await fetch("/api/login/session", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "创建失败");

      state.fingerprint_id = data.fingerprint_id;
      state.fingerprint_hash = data.fingerprint_hash;
      state.expires_at = data.expires_at;

      el("loginLink").href = data.login_url;
      el("loginLink").textContent = data.login_url;
      el("fpId").textContent = data.fingerprint_id;
      el("fpHash").textContent = data.fingerprint_hash;
      el("expiresAt").textContent = data.expires_at;
      el("pollBtn").disabled = false;
      setStatus("登录链接已生成，请在新窗口完成授权。", "ok");
    }

    async function pollStatus() {
      if (!state.fingerprint_id) return;
      setStatus("轮询中...");
      const qs = new URLSearchParams({
        fingerprint_id: state.fingerprint_id,
        fingerprint_hash: state.fingerprint_hash,
        expires_at: state.expires_at
      });
      const res = await fetch(`/api/login/status?${qs}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || "查询失败");

      if (!data.user) {
        setStatus("尚未授权，稍后重试。");
        return;
      }

      const token = data.user.authToken || "";
      el("tokens").value = JSON.stringify([token]);
      const tag = data.token_registered ? "并已注册到服务" : "（已存在，无需重复注册）";
      setStatus(`登录成功：${data.user.name || ""} ${data.user.email || ""} ${tag}`.trim(), "ok");
    }

    el("createBtn").addEventListener("click", async () => {
      try { await createSession(); } catch (e) { setStatus(e.message, "err"); }
    });

    el("pollBtn").addEventListener("click", async () => {
      try { await pollStatus(); } catch (e) { setStatus(e.message, "err"); }
    });

    el("adminLoginBtn").addEventListener("click", async () => {
      try { await loginAdmin(); } catch (e) { setStatus(e.message, "err"); }
    });

    el("adminLogoutBtn").addEventListener("click", async () => {
      try { await logoutAdmin(); } catch (e) { setStatus(e.message, "err"); }
    });

    el("statsRefreshBtn").addEventListener("click", async () => {
      try { await fetchStats(); setStatus("统计已更新。", "ok"); } catch (e) { setStatus(e.message, "err"); }
    });

    fetchAdminStatus()
      .then(() => fetchStats())
      .catch((e) => setStatus(e.message, "err"));
  </script>
</body>
</html>
